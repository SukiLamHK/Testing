<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toby Lam | Artistic Portfolio</title>
    <!-- 引入藝術感襯線字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-navbar">
        <div class="nav-logo">Toby Lam.</div>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#experience">Experience</a>
            <a href="#work">Work</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <!-- About Section -->
        <section id="about" class="content-section">
            <h2 class="section-title">About Me</h2>
            <p>透過影像與光影，記錄生活中的無形情感。我將藝術視為與世界對話的介面。</p>
        </section>

        <!-- Experience Section -->
        <section id="experience" class="content-section">
            <h2 class="section-title">Experience</h2>
            <div class="exp-card">
                <h3>Visual Artist & Director</h3>
                <p class="date">2024 - Present</p>
                <p>專注於藝術展演與影像敘事，透過跨媒材創作，捕捉瞬間的藝術張力。</p>
            </div>
        </section>

        <!-- Work Section -->
        <section id="work" class="content-section">
            <h2 class="section-title">My Artwork</h2>
            <div class="filter-menu">
                <button class="filter-btn active" data-target="all">All</button>
                <button class="filter-btn" data-target="painting">Paintings</button>
                <button class="filter-btn" data-target="video">Videos</button>
            </div>
            <main class="gallery-container" id="gallery-grid"></main>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="content-section">
            <h2 class="section-title">Get In Touch</h2>
            <p>目前開放各類藝術合作、影像接案與聯絡。</p>
            <a href="mailto:tobylam@example.com" class="contact-btn">Say Hello</a>
        </section>
    </div>

    <!-- Lenis & Custom Scripts -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
