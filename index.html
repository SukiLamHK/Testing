<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toby Lam | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>
</head>
<body>

<!-- 頂部固定導覽列 -->
<nav class="top-navbar">
    <div class="nav-logo"><img src="name.PNG" alt="Toby Lam" class="header-logo"></div>
    <div class="nav-links">
        <a href="#about">About</a>
        <a href="#experience">Experience</a>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- 主要內容區 -->
<div class="main-wrapper">
    
    <!-- About 區塊 -->
    <section id="about" class="content-section" data-bgcolor="#ffffff" data-textcolor="#000000">
        <h2 class="section-title">Toby Lam</h2>
        <p>（這裡放入你原本 about 的所有文字內容...）</p>
    </section>

    <!-- Experience 區塊 -->
    <section id="experience" class="content-section" data-bgcolor="#eacbd1" data-textcolor="#536fae">
        <h2 class="section-title">Experience</h2>
        <div class="exp-card"> 
            <h3>獨立藝術創作者 / 影像導演</h3> 
            <p class="date">2024 - Present</p> 
            <p>負責個人品牌經營，策劃多場視覺藝術展示...</p> 
        </div> 
    </section>

    <!-- Work 區塊 -->
    <section id="work" class="content-section" data-bgcolor="#536fae" data-textcolor="#eacbd1">
        <h2 class="section-title">My Artwork</h2>
        <!-- 這裡放你的 gallery-container -->
    </section>

    <!-- Contact 區塊 -->
    <section id="contact" class="content-section" data-bgcolor="#e3857a" data-textcolor="#f1dba7">
        <h2 class="section-title">Get In Touch</h2>
        <p>目前開放各類藝術合作...</p>
        <a href="mailto:你的Email@example.com" class="contact-btn">Say Hello</a> 
    </section>

</div>

<!-- GSAP 變色腳本 -->
<script>
    gsap.registerPlugin(ScrollTrigger);
    document.querySelectorAll("section").forEach((section) => {
      ScrollTrigger.create({
        trigger: section,
        start: "top center",
        end: "bottom center",
        onEnter: () => {
          gsap.to(document.body, { backgroundColor: section.dataset.bgcolor, color: section.dataset.textcolor, duration: 0.5 });
        },
        onEnterBack: () => {
          gsap.to(document.body, { backgroundColor: section.dataset.bgcolor, color: section.dataset.textcolor, duration: 0.5 });
        }
      });
    });
</script>

</body>
</html>
